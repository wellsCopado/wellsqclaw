name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-dev ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev \
            libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libssl-dev libffi-dev liblzma-dev \
            make git autoconf automake libtool pkg-config \
            patchelf openjdk-17-jdk

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.37
          pip install buildozer python-for-android

      - name: Set up Android SDK with buildozer-compatible layout
        run: |
          mkdir -p $HOME/.buildozer/android/platform
          cd $HOME/.buildozer/android/platform
          
          # Download Android SDK command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          
          # Create BOTH layouts: new cmdline-tools AND old tools/bin symlinks
          # buildozer hardcodes tools/bin/sdkmanager path
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_DIR/cmdline-tools/latest
          mkdir -p $SDK_DIR/tools/bin
          
          # Install to new layout
          cp -r cmdline-tools/* $SDK_DIR/cmdline-tools/latest/ 2>/dev/null || true
          
          # Create symlinks for old layout (what buildozer expects)
          ln -sf $SDK_DIR/cmdline-tools/latest/bin/sdkmanager $SDK_DIR/tools/bin/sdkmanager
          ln -sf $SDK_DIR/cmdline-tools/latest/bin/avdmanager $SDK_DIR/tools/bin/avdmanager
          
          # Verify
          echo "=== sdkmanager at old path ==="
          ls -la $SDK_DIR/tools/bin/sdkmanager
          $SDK_DIR/tools/bin/sdkmanager --version
          
          # Accept licenses and install components
          yes | $SDK_DIR/tools/bin/sdkmanager --licenses || true
          yes | $SDK_DIR/tools/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" || true
          
          # Download NDK
          if [ ! -d "android-ndk-r25b" ]; then
            wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O ndk.zip
            unzip -q ndk.zip
            rm ndk.zip
          fi
          
          rm -rf cmdline-tools cmdline-tools.zip

      - name: Build debug APK
        run: |
          set -o pipefail
          buildozer android debug --verbose 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cryptomindpro-debug.apk
          path: bin/*.apk
          retention-days: 7
          if-no-files-found: warn

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Debug output
        if: always()
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== bin/ contents ==="
          ls -la bin/ 2>/dev/null || echo "No bin dir"
          echo "=== build.log tail ==="
          tail -80 build.log 2>/dev/null || echo "No build.log"
