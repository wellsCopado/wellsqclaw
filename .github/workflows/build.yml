name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libssl-dev \
            libffi-dev \
            liblzma-dev \
            make \
            git \
            autoconf \
            automake \
            libtool \
            pkg-config

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer
          pip install python-for-android

      - name: Set up Android SDK
        run: |
          mkdir -p $HOME/.buildozer/android/platform
          cd $HOME/.buildozer/android/platform
          
          # Download Android SDK
          if [ ! -d "android-sdk" ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            mkdir -p android-sdk/cmdline-tools
            mv cmdline-tools android-sdk/cmdline-tools/latest
            rm cmdline-tools.zip
          fi
          
          # Download NDK
          if [ ! -d "android-ndk-r25b" ]; then
            wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O ndk.zip
            unzip -q ndk.zip
            rm ndk.zip
          fi
          
          # Accept licenses and install SDK components
          yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" || true

      - name: Set environment variables
        run: |
          echo "ANDROIDSDK=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROIDNDK=$HOME/.buildozer/android/platform/android-ndk-r25b" >> $GITHUB_ENV
          echo "ANDROIDAPI=34" >> $GITHUB_ENV
          echo "ANDROIDMINAPI=24" >> $GITHUB_ENV

      - name: Build debug APK
        run: |
          buildozer android debug --verbose 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: cryptomindpro-debug.apk
          path: bin/*.apk
          retention-days: 7

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: List build outputs
        run: |
          echo "=== Build outputs ==="
          ls -la bin/ 2>/dev/null || echo "No bin directory"
          echo ""
          echo "=== APK files ==="
          find . -name "*.apk" 2>/dev/null
