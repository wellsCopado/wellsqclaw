name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    container:
      image: kivy/buildozer:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK inside Kivy Docker container
        run: |
          # The kivy/buildozer image already has everything pre-installed:
          # Android SDK, NDK, buildozer, python-for-android, cython, etc.
          buildozer android debug 2>&1 | tee build.log
          echo "Exit code: $?"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cryptomindpro-debug.apk
          path: bin/*.apk
          retention-days: 7
          if-no-files-found: warn

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Show results
        if: always()
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== build.log tail ==="
          tail -50 build.log 2>/dev/null || echo "No build.log"
